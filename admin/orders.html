<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders – Shree Sarees Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
        <img src="http://localhost:5000/assets/shree-saree-logo-3d_1.jpg"
             alt="Shree Saree Logo"
             class="logo-image">
        <span>Admin Panel</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
            <a href="products.html" class="nav-item">📦 Products</a>
            <a href="stock.html" class="nav-item">🏭 Stock Inward</a>
            <a href="orders.html" class="nav-item active">🛒 Orders</a>
            <a href="shipments.html" class="nav-item">🚚 Shipments</a>
            <a href="users.html" class="nav-item">👥 Users</a>
        </nav>
        <div class="sidebar-footer">
            <span id="adminName"></span>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h2>Orders Management</h2>
        </div>

        <!-- Filters -->
        <div class="card filter-bar">
            <select id="filterStatus" onchange="loadOrders()">
                <option value="">All Status</option>
                <option value="placed">Placed</option>
                <option value="confirmed">Confirmed</option>
                <option value="processing">Processing</option>
                <option value="shipped">Shipped</option>
                <option value="delivered">Delivered</option>
                <option value="cancelled">Cancelled</option>
            </select>
        </div>

        <!-- Orders Table -->
        <div class="card">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Order No</th>
                            <th>Shop Name</th>
                            <th>Broker</th>
                            <th>Bundles</th>
                            <th>Sarees</th>
                            <th>Amount</th>
                            <th>Due Date</th>
                            <th>Payment</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable">
                        <tr><td colspan="10"
                            class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div class="modal" id="orderDetailModal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3>Order Details</h3>
                <span class="modal-close"
                    onclick="closeModal('orderDetailModal')">✕</span>
            </div>
            <div id="orderDetailContent"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
